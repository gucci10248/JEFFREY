# BioMCP — Docker Compose deployment
# Single-service MCP server for biomedical literature & genomics
services:
  biomcp:
    image: biomcp:latest
    container_name: biomcp

    # Security hardening
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # only needed if using port < 1024

    # Networking — map to host port
    ports:
      - "${BIOMCP_PORT:-8080}:8080"

    # Persistent volumes (optional — cache survives restarts)
    volumes:
      - biomcp_data:/app/data:rw
      - biomcp_cache:/app/cache:rw

    # Environment — API keys from .env file (never commit!)
    env_file:
      - .env

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

    # Restart policy
    restart: unless-stopped

    # Health check
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  biomcp_data:
    driver: local
  biomcp_cache:
    driver: local
