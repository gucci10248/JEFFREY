<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="dna1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
    <linearGradient id="dna2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- DNA helix structure -->
  <g transform="translate(256,256)">
    <!-- Left strand -->
    <path d="M-80,-180 C-80,-100 80,-140 80,-60 C80,20 -80,-20 -80,60 C-80,140 80,100 80,180"
          fill="none" stroke="url(#dna1)" stroke-width="12" stroke-linecap="round"/>

    <!-- Right strand -->
    <path d="M80,-180 C80,-100 -80,-140 -80,-60 C-80,20 80,-20 80,60 C80,140 -80,100 -80,180"
          fill="none" stroke="url(#dna2)" stroke-width="12" stroke-linecap="round" opacity="0.7"/>

    <!-- Rungs -->
    <line x1="-70" y1="-140" x2="70" y2="-140" stroke="#8b949e" stroke-width="4" opacity="0.6"/>
    <line x1="-70" y1="-100" x2="70" y2="-100" stroke="#8b949e" stroke-width="4" opacity="0.6"/>
    <line x1="-70" y1="-60" x2="70" y2="-60" stroke="#8b949e" stroke-width="4" opacity="0.6"/>
    <line x1="-70" y1="-20" x2="70" y2="-20" stroke="#8b949e" stroke-width="4" opacity="0.6"/>
    <line x1="-70" y1="20" x2="70" y2="20" stroke="#8b949e" stroke-width="4" opacity="0.6"/>
    <line x1="-70" y1="60" x2="70" y2="60" stroke="#8b949e" stroke-width="4" opacity="0.6"/>
    <line x1="-70" y1="100" x2="70" y2="100" stroke="#8b949e" stroke-width="4" opacity="0.6"/>
    <line x1="-70" y1="140" x2="70" y2="140" stroke="#8b949e" stroke-width="4" opacity="0.6"/>

    <!-- Nodes on helix -->
    <circle cx="-70" cy="-180" r="6" fill="#58a6ff"/>
    <circle cx="70" cy="-180" r="6" fill="#3fb950"/>
    <circle cx="70" cy="0" r="6" fill="#58a6ff"/>
    <circle cx="-70" cy="0" r="6" fill="#3fb950"/>
    <circle cx="-70" cy="180" r="6" fill="#58a6ff"/>
    <circle cx="70" cy="180" r="6" fill="#3fb950"/>
  </g>

  <!-- Text -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="48" font-weight="700" fill="#f0f6fc" letter-spacing="4">BioMCP</text>
</svg>
